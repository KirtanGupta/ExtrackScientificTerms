<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Scientific Term Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #030712;
      --surface: #0d1117;
      --border: #1e2d3d;
      --accent: #00f5c4;
      --accent2: #7c3aed;
      --accent3: #f59e0b;
      --text: #e2e8f0;
      --muted: #4a5568;
      --glow: rgba(0, 245, 196, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridShift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridShift {
      0% { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: orbFloat 12s ease-in-out infinite;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: rgba(124,58,237,0.12);
      top: -100px; left: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: rgba(0,245,196,0.08);
      bottom: -80px; right: -80px;
      animation-delay: -6s;
    }
    .orb-3 {
      width: 200px; height: 200px;
      background: rgba(245,158,11,0.07);
      top: 50%; right: 20%;
      animation-delay: -3s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    .container {
      width: 100%;
      max-width: 680px;
      padding: 24px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 44px; height: 44px;
      border: 2px solid var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .logo-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,245,196,0.15), transparent);
    }
    .logo-icon svg {
      width: 22px; height: 22px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
      position: relative;
      z-index: 1;
    }

    .logo-pulse {
      position: absolute;
      inset: -2px;
      border-radius: 12px;
      border: 2px solid var(--accent);
      animation: logoPulse 2.5s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { opacity: 0; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.1); }
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .header-text h1 span { color: var(--accent); }
    .header-text p {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,245,196,0.06);
      border: 1px solid rgba(0,245,196,0.2);
      border-radius: 100px;
      padding: 5px 12px;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.5px;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Input Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.3s;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,245,196,0.3), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .card:focus-within::before { opacity: 1; }
    .card:focus-within { border-color: rgba(0,245,196,0.3); }

    .card-label {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      line-height: 1.7;
      resize: none;
      min-height: 120px;
    }
    textarea::placeholder { color: var(--muted); }

    /* Submit button */
    .btn-wrap {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }

    .char-count {
      font-size: 11px;
      color: var(--muted);
    }

    button {
      position: relative;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 11px 24px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.3s;
    }
    button::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(0,245,196,0.35);
    }
    button:active { transform: translateY(0px); }

    .btn-arrow {
      width: 16px; height: 16px;
      transition: transform 0.2s;
    }
    button:hover .btn-arrow { transform: translateX(3px); }

    button.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    /* Spinner */
    .spinner {
      display: none;
      width: 14px; height: 14px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #000;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading .spinner { display: block; }
    .loading .btn-text, .loading .btn-arrow { display: none; }

    /* Response card */
    .response-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), border-color 0.3s;
      pointer-events: none;
    }
    .response-card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .response-card.has-content {
      border-color: rgba(124,58,237,0.3);
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(124,58,237,0.05);
    }
    .response-tag {
      font-size: 10px;
      color: #a78bfa;
      letter-spacing: 2px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .response-tag::before {
      content: '';
      width: 6px; height: 6px;
      background: #a78bfa;
      border-radius: 50%;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Mono', monospace;
    }
    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: none;
      box-shadow: none;
    }
    .copy-btn::before { display: none; }

    .response-body {
      padding: 20px;
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      min-height: 80px;
      white-space: pre-wrap;
      position: relative;
    }

    /* Thinking animation */
    .thinking {
      display: none;
      align-items: center;
      gap: 5px;
      padding: 20px;
    }
    .thinking.active { display: flex; }
    .thinking span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: think 1.2s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes think {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Typewriter cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: cursorBlink 0.8s step-end infinite;
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Scan line effect on response */
    .response-body::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(0,245,196,0.4), transparent);
      animation: scanLine 3s ease-in-out infinite;
      pointer-events: none;
      opacity: 0;
    }
    .response-body.scanning::after { opacity: 1; }
    @keyframes scanLine {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }
    .footer span { color: var(--accent); }
  </style>
</head>
<body>

  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="container">

    <div class="header">
      <div class="logo-icon">
        <div class="logo-pulse"></div>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
      </div>
      <div class="header-text">
        <h1>Scientific<span>Terms</span></h1>
        <p>Paste your document below and click extract</p>
      </div>
      <div class="status-pill">
        <div class="status-dot"></div>
        ONLINE
      </div>
    </div>

    <div class="card">
      <div class="card-label">// document text</div>
      <textarea id="text" placeholder="Paste your document text here..." oninput="updateCount()"></textarea>
      <div class="btn-wrap">
        <span class="char-count" id="charCount">0 chars</span>
        <button onclick="sendPrompt()" id="submitBtn">
          <span class="btn-text">EXTRACT</span>
          <svg class="btn-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          <div class="spinner"></div>
        </button>
      </div>
    </div>

    <div class="response-card" id="responseCard">
      <div class="response-header">
        <div class="response-tag">Extracted Terms</div>
        <button class="copy-btn" onclick="copyResponse()">COPY</button>
      </div>
      <div class="thinking" id="thinking">
        <span></span><span></span><span></span>
      </div>
      <div class="response-body" id="result" style="display:none;"></div>
    </div>

    <div class="footer">Powered by <span>Kirtan Gupta </span> · Neural Interface</div>
  </div>

  <script>
    function updateCount() {
      const len = document.getElementById('text').value.length;
      document.getElementById('charCount').textContent = len + ' chars';
    }

    function copyResponse() {
      const text = document.getElementById('result').innerText;
      navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = 'COPIED!';
        setTimeout(() => btn.textContent = 'COPY', 1500);
      });
    }

    function typeText(el, text, speed = 18) {
      return new Promise(resolve => {
        el.innerHTML = '';
        const cursor = document.createElement('span');
        cursor.className = 'cursor';
        el.appendChild(cursor);

        let i = 0;
        const interval = setInterval(() => {
          if (i < text.length) {
            el.insertBefore(document.createTextNode(text[i]), cursor);
            i++;
          } else {
            clearInterval(interval);
            cursor.remove();
            resolve();
          }
        }, speed);
      });
    }

    async function sendPrompt() {
      const text = document.getElementById("text").value.trim();
      if (!text) {
        document.getElementById("text").focus();
        return;
      }

      const btn = document.getElementById("submitBtn");
      const card = document.getElementById("responseCard");
      const thinking = document.getElementById("thinking");
      const result = document.getElementById("result");

      btn.classList.add('loading');
      card.classList.add('visible');
      card.classList.remove('has-content');
      thinking.classList.add('active');
      result.style.display = 'none';
      result.classList.remove('scanning');

      try {
        // send the text to our own server instead of calling the external API directly
        const response = await fetch("/api/ai", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        let output;
        if (!response.ok) {
          output = "⚠ " + (data.error || "Server error");
        } else {
          output = data.output ?? "No response received.";
        }

        thinking.classList.remove('active');
        result.style.display = 'block';
        result.classList.add('scanning');
        card.classList.add('has-content');

        await typeText(result, output, 12);
        result.classList.remove('scanning');

      } catch (err) {
        thinking.classList.remove('active');
        result.style.display = 'block';
        result.textContent = "⚠ Connection failed: " + err.message;
        card.classList.add('has-content');
      }

      btn.classList.remove('loading');
    }

    document.getElementById("text").addEventListener("keydown", e => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) sendPrompt();
    });
  </script>
</body>
</html>
